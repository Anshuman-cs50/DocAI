services:
  - type: web
    name: docai-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: URL_UPDATE_SECRET
        sync: false
